<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora APTR - Andres Rodriguez Cardona</title>
    <style>
        :root { --primary: #2196F3; --success: #4CAF50; --warning: #FF9800; --danger: #F44336; --bg: #F5F7FA; --card: #FFFFFF; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        #app-container { width: 100%; max-width: 450px; background: var(--bg); display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        header { background-color: var(--primary); color: white; padding: 25px 20px; text-align: center; }
        .content { padding: 20px; flex-grow: 1; }
        .screen { display: none; }
        .active { display: block; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #E0E0E0; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.9rem; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #CCC; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; color: white; margin-bottom: 10px; }
        .btn-primary { background-color: var(--primary); }
        .btn-success { background-color: var(--success); }
        .btn-danger { background-color: var(--danger); }
        .btn-back { background-color: #9E9E9E; }
        .result-box { padding: 15px; border-radius: 8px; font-weight: bold; text-align: center; margin-bottom: 15px; }
        .especie-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .radio-btn { border: 1px solid #DDD; padding: 10px; border-radius: 8px; text-align: center; cursor: pointer; background: white; }
        .radio-btn.selected { background: var(--primary); color: white; border-color: var(--primary); }
        .tratamiento-tabla { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9rem; }
        .tratamiento-tabla td { padding: 8px; border-bottom: 1px solid #EEE; }
        .bold { font-weight: bold; color: #333; }
        footer { text-align: center; padding: 15px; font-size: 0.85rem; color: #777; border-top: 1px solid #EEE; margin-top: auto; line-height: 1.4; }
    </style>
</head>
<body>

<div id="app-container">
    <header>
        <div style="font-size: 1.4rem; font-weight: bold;">APTR - Rabia</div>
        <div style="font-size: 0.8rem; opacity: 0.8;">Protocolo Institucional 2024</div>
    </header>

    <div class="content">
        <div id="screen-patient" class="screen active">
            <div class="card">
                <label>Nombre del Paciente</label>
                <input type="text" id="p-nombre" placeholder="Nombre completo">
                <label>Fecha de Consulta</label>
                <input type="date" id="p-fecha">
                <label>¿Vacunación Antirrábica Previa?</label>
                <select id="p-vacuna-previa">
                    <option value="No">No</option>
                    <option value="Si">Si</option>
                </select>
                <label>¿Presenta Comorbilidad?</label>
                <select id="p-comorbilidad">
                    <option value="2">No</option>
                    <option value="1">Si</option>
                </select>
                <label>Peso del Paciente (Kg)</label>
                <input type="number" id="p-peso" placeholder="Ej: 70">
            </div>
            <button class="btn btn-primary" onclick="goTo('screen-species')">Siguiente</button>
        </div>

        <div id="screen-species" class="screen">
            <label>Especie Agresora:</label>
            <div class="especie-grid" id="species-options"></div>
            <br>
            <button class="btn btn-primary" onclick="handleSpeciesNext()">Siguiente</button>
            <button class="btn btn-back" onclick="goTo('screen-patient')">Atrás</button>
        </div>

        <div id="screen-info" class="screen">
            <div class="card">
                <label>Estado del animal al momento de la consulta</label>
                <select id="a-estado" onchange="toggleAnimalSub()">
                    <option value="">Seleccione...</option>
                    <option value="Vivo">Vivo</option>
                    <option value="Muerto">Muerto</option>
                    <option value="Desconocido">Desconocido</option>
                </select>
                <div id="sub-animal" style="display:none;">
                    <label>Condición del Animal</label>
                    <select id="a-ubicacion">
                        <option value="">Seleccione...</option>
                        <option value="Observable">Observable (Conocido)</option>
                        <option value="Perdido">Perdido / Desconocido</option>
                    </select>
                </div>
            </div>
            <button class="btn btn-primary" onclick="validateInfo()">Siguiente</button>
            <button class="btn btn-back" onclick="goTo('screen-species')">Atrás</button>
        </div>

        <div id="screen-lesion" class="screen">
            <div class="card">
                <label>Tipo de Lesión</label>
                <select id="l-tipo">
                    <option value="Unica">Mordedura Única</option>
                    <option value="Multiple">Mordedura Múltiple</option>
                    <option value="Arañazo">Arañazo</option>
                    <option value="Lamedura">Lamedura mucosa</option>
                    <option value="Contacto">Contacto sin lesión</option>
                </select>
                <label>Profundidad</label>
                <select id="l-profundidad">
                    <option value="Superficial">Superficial</option>
                    <option value="Profunda">Profunda</option>
                </select>
                <label>Localización</label>
                <select id="l-sitio">
                    <option value="">Seleccione...</option>
                    <option value="1">Cabeza / Cuello</option>
                    <option value="2">Manos / Dedos</option>
                    <option value="3">Tronco</option>
                    <option value="4">Miembros Superiores</option>
                    <option value="5">Miembros Inferiores</option>
                    <option value="6">Genitales</option>
                </select>
            </div>
            <button class="btn btn-danger" onclick="calculate()">CALCULAR TRATAMIENTO</button>
            <button class="btn btn-back" onclick="handleLesionBack()">Atrás</button>
        </div>

        <div id="screen-result" class="screen">
            <div id="res-tipo" class="result-box"></div>
            <div class="card" id="card-vacunacion">
                <label style="color: var(--primary);">Cronograma de Vacunación</label>
                <table class="tratamiento-tabla" id="tabla-fechas"></table>
            </div>
            <div class="card" id="card-suero" style="display:none;">
                <label style="color: var(--danger);">Suero Antirrábico</label>
                <table class="tratamiento-tabla">
                    <tr><td>Dosis Total:</td><td class="bold" id="suero-ui">--</td></tr>
                    <tr><td>Frascos:</td><td class="bold" id="suero-frascos">--</td></tr>
                </table>
            </div>
            <div class="card"><p id="res-conducta" style="white-space: pre-line; font-size: 0.9rem;"></p></div>
            <button class="btn btn-success" onclick="sendWhatsApp()">ENVIAR REPORTE</button>
            <button class="btn btn-primary" onclick="location.reload()">NUEVA CONSULTA</button>
        </div>
    </div>
    <footer>&copy; 2026 - Andres Rodriguez Cardona</footer>
</div>

<script>
    let selectedSpecies = "1";
    const speciesList = [
        {id: "1", name: "Perro"}, {id: "2", name: "Gato"},
        {id: "6", name: "Murciélago"}, {id: "7", name: "Zorro"},
        {id: "8", name: "Mico"}, {id: "3", name: "Bovino"},
        {id: "10", name: "Otros Silv."}
    ];

    document.getElementById('p-fecha').valueAsDate = new Date();
    const grid = document.getElementById('species-options');
    speciesList.forEach(sp => {
        const div = document.createElement('div');
        div.className = `radio-btn ${sp.id === "1" ? 'selected' : ''}`;
        div.innerText = sp.name;
        div.onclick = () => {
            document.querySelectorAll('.radio-btn').forEach(b => b.classList.remove('selected'));
            div.classList.add('selected');
            selectedSpecies = sp.id;
        };
        grid.appendChild(div);
    });

    function toggleAnimalSub() {
        const estado = document.getElementById('a-estado').value;
        const sub = document.getElementById('sub-animal');
        sub.style.display = (estado === "Vivo") ? "block" : "none";
        if(estado !== "Vivo") document.getElementById('a-ubicacion').value = (estado === "") ? "" : "Perdido";
    }

    function validateInfo() {
        const estado = document.getElementById('a-estado').value;
        const ubicacion = document.getElementById('a-ubicacion').value;
        if(!estado || (estado === "Vivo" && !ubicacion)) { alert("Complete datos del animal"); return; }
        goTo('screen-lesion');
    }

    function goTo(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }

    function handleSpeciesNext() { (selectedSpecies === "1" || selectedSpecies === "2") ? goTo('screen-info') : goTo('screen-lesion'); }
    function handleLesionBack() { (selectedSpecies === "1" || selectedSpecies === "2") ? goTo('screen-info') : goTo('screen-species'); }

    function formatDate(date) {
        const d = new Date(date); d.setMinutes(d.getMinutes() + d.getTimezoneOffset());
        return d.toLocaleDateString('es-CO', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }

    function addDays(date, days) {
        const d = new Date(date); d.setMinutes(d.getMinutes() + d.getTimezoneOffset());
        d.setDate(d.getDate() + days); return formatDate(d);
    }

    function calculate() {
        const sitio = document.getElementById('l-sitio').value;
        const peso = parseFloat(document.getElementById('p-peso').value);
        const fechaBase = document.getElementById('p-fecha').value;
        const vacPrev = document.getElementById('p-vacuna-previa').value;
        const comorb = document.getElementById('p-comorbilidad').value;

        if(!sitio || isNaN(peso)) { alert("Faltan datos"); return; }

        const tipo = document.getElementById('l-tipo').value;
        const prof = document.getElementById('l-profundidad').value;
        const ubicacion = (selectedSpecies === "1" || selectedSpecies === "2") ? document.getElementById('a-ubicacion').value : "Perdido";

        let expGrave = false, reqVac = false, reqSuero = false;

        if(tipo === "Contacto") { expGrave = false; reqVac = false; reqSuero = false; }
        else if(tipo === "Lamedura" || !["1", "2"].includes(selectedSpecies)) { expGrave = true; reqVac = true; reqSuero = true; }
        else if(selectedSpecies === "1" || selectedSpecies === "2") {
            if(ubicacion === "Observable") { expGrave = false; reqVac = false; reqSuero = false; }
            else {
                if(prof === "Superficial" && tipo === "Arañazo" && ["3", "4", "5"].includes(sitio)) { expGrave = false; reqVac = true; reqSuero = false; }
                else { expGrave = true; reqVac = true; reqSuero = true; }
            }
        }

        // LÓGICA SOLICITADA: Vacunación previa solo quita el suero, pero NO recorta las vacunas.
        if(vacPrev === "Si") { reqSuero = false; reqVac = true; }

        const resBox = document.getElementById('res-tipo');
        if(reqVac) {
            resBox.innerText = expGrave ? "EXPOSICIÓN GRAVE" : "EXPOSICIÓN LEVE";
            resBox.style.backgroundColor = expGrave ? "var(--danger)" : "var(--warning)";
            document.getElementById('card-vacunacion').style.display = "block";
            
            // SIEMPRE MOSTRAR LAS 4 DOSIS (o 5 si hay comorbilidad)
            let html = `<tr><td>Dosis 0:</td><td class="bold">${formatDate(fechaBase)}</td></tr>
                        <tr><td>Dosis 3:</td><td class="bold">${addDays(fechaBase, 3)}</td></tr>
                        <tr><td>Dosis 7:</td><td class="bold">${addDays(fechaBase, 7)}</td></tr>
                        <tr><td>Dosis 14:</td><td class="bold">${addDays(fechaBase, 14)}</td></tr>`;
            
            if(comorb === "1") {
                html += `<tr><td>Dosis 21:</td><td class="bold">${addDays(fechaBase, 21)}</td></tr>`;
            }
            document.getElementById('tabla-fechas').innerHTML = html;
        } else {
            resBox.innerText = "NO ES EXPOSICIÓN"; resBox.style.backgroundColor = "var(--success)";
            document.getElementById('card-vacunacion').style.display = "none";
        }

        if(reqSuero) {
            document.getElementById('card-suero').style.display = "block";
            document.getElementById('suero-ui').innerText = (peso * 40) + " UI";
            document.getElementById('suero-frascos').innerText = Math.ceil((peso * 40) / 1000) + " frascos";
        } else {
            document.getElementById('card-suero').style.display = "none";
        }

        document.getElementById('res-conducta').innerText = expGrave ? 
            "• Aplicar Suero + Vacuna (Dosis 0) hoy.\n• EXTREMAR SEGUIMIENTO: Garantizar que el paciente complete las 4 dosis programadas.\n• Lavado exhaustivo de herida." : 
            (reqVac ? "• Iniciar esquema de vacunación hoy.\n• Entregar carnet con las 4 fechas programadas." : "• Observación del animal por 10 días.");
        
        goTo('screen-result');
    }

    function sendWhatsApp() {
        const nombre = document.getElementById('p-nombre').value || "Paciente";
        const mensaje = `*REPORTE APTR - HOSPITAL*%0A*Paciente:* ${nombre}%0A*Resultado:* ${document.getElementById('res-tipo').innerText}%0A_Esquema completo programado._`;
        window.open(`https://wa.me/573116366677?text=${mensaje}`, '_blank');
    }
</script>
</body>
</html>
